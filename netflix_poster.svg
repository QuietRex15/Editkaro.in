<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <!-- Subtle radial gradient for the background to make it look cinematic and premium -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#151515" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Centered Netflix Wordmark Logo -->
  <g filter="url(#shadow)">
    <image href="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" x="400" y="325" width="800" height="250" />
  </g>
</svg>
